name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: untitled

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Gluon GraalVM
        uses: gluonhq/setup-graalvm@master
        with:
          graalvm: '22.1.0.1-Final'
          jdk: 'java17'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28c
          add-to-path: false

      - name: Set up Maven cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-android-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-android-m2-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libgl-dev \
            libegl1-mesa-dev \
            libx11-dev \
            libxtst-dev \
            unzip \
            zip \
            curl

      - name: Expose GraalVM for Gluon
        run: |
          echo "GRAALVM_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"
          java -version
          gu --version
          native-image --version

      - name: Reset native build caches
        run: |
          rm -rf target/gluonfx
          rm -rf ~/.gluon/substrate
          rm -rf ~/.gluon/graalvm
          mkdir -p ~/.gluon

      - name: Build Android package
        run: |
          export ANDROID_SDK="$ANDROID_HOME"
          mvn -B -Pandroid -DskipTests clean gluonfx:build gluonfx:package
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harmony-player-android
          path: |
            target/**/*.apk
            target/**/*.aab
            target/gluonfx/**/log/*
          if-no-files-found: warn
